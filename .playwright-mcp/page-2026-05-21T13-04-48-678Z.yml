            - generic [ref=e114]:
              - generic [ref=e115]: 中华人民共和国海关进出境行李物品监管办法
              - generic [ref=e116]: 第二章 申报 · chunk 2
              - paragraph [ref=e117]: 第二章 申报 第八条 进出境人员携带行李物品进出境，应当如实向海关申报。 海关在申报台等指定地点接受进出境人员的书面申报。 第九条 进境人员有下列情形之一的，应当向海关书面申报： （一）携带禁止进境物品的； （二）携带限制进境物品超过限额、限量要求或者应当提交许可证件以及其他证明材料的； （三）携带动植物、动植物产品和其他检疫物的； （四）携带血液等人体组织、病原微生物、生物制品等关系公共卫生安全的物品的； （五）携带受到检疫传染病污染或者存在传播检疫传染病风险的物品的； （六）携带超过规定数额货币现钞的； （七）携带超过规定免税数额或者限量要求物品的； （八）携带货物、货样、广告品的； （九）以分离运输方式运进行李物品的； （十）携带其他依法需要书面申报行李物品的。 第十条 出境人员有下列情形之一的，应当向海关书面申报： （一）携带禁止出境物品的； （二）携带限制出境物品超过限额、限量要求或者应当提交许可证件以及其他证明材料的； （三）携带货物、货样、广告品的； （四）携带血液等人体组织、病原微生物、生物制品等关系公共卫生安全的物品的； （五）携带受到检疫传染病污染或者存在传播检疫传染病风险的物品的； （六）携带超过规定数额货币现钞的； （七）携带其他依法需要书面申报行李物品的。 第十一条 进出境人员向海关书面申报的，应当填写纸质申报单或者电子申报数据。 进出境人员应当在申报台等指定地点向海关出示本人有效进出境证件，递交纸质申报单或者确认电子申报数据，提交许可证件以及其他证明材料，并接受海关验核。 有第九条、第十条所列情形，在海关采取查验措施前，未按上述规定完成书面申报手续的，视为未向海关申报。 第十二条 通过海关实施“红绿通道”申报模式的地点进出境时，携带行李物品的进出境人员按照本办法应当向海关书面申报的，以及不明海关规定或者不知如何选择通道的，应当选择“红色通道”。其他进出境人员，可以选择“绿色通道”。 第十三条 暂时进出境的行李物品，可以在进出境时向海关书面申报登记并按照规定提供担保，经海关核准后批注放行。复带相关行李物品出境或者进境时，海关凭批注记录验放。
