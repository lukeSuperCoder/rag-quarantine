                  - text: （截留期限计入在内）。
                - paragraph [ref=e71]:
                  - strong [ref=e72]: 补充说明
                  - text: ：并非所有宠物都需要隔离。来自指定国家或地区（具有有效电子芯片且现场检疫合格）、来自非指定国家或地区（具有有效电子芯片且提供采信实验室狂犬病抗体检测报告并现场检疫合格），以及导盲犬、导听犬、搜救犬（具有有效电子芯片及相应证明并现场检疫合格）的宠物，可免于隔离检疫。
