                  - strong [ref=e82]: 一、所有宠物必须提供的基础材料：
                - list [ref=e83]:
                  - listitem [ref=e84]:
                    - strong [ref=e85]: 有效检疫证书
                    - text: ：输出国家或者地区官方动物检疫机构出具。
                  - listitem [ref=e86]:
                    - strong [ref=e87]: 狂犬病疫苗接种证书
                    - text: 。
                  - listitem [ref=e88]:
                    - strong [ref=e89]: 有效电子芯片
                    - text: ：须符合国际标准ISO 11784和11785（15位微芯片代码只包含数字）。
                  - listitem [ref=e90]:
                    - strong [ref=e91]: 信息登记表
                    - text: ：携带人在现场需填写《携带入境宠物（犬、猫）信息登记表》。
                - paragraph [ref=e92]:
                  - strong [ref=e93]: 二、特定情况需额外提供的材料：
                - list [ref=e94]:
                  - listitem [ref=e95]:
                    - strong [ref=e96]: 来自非指定国家或地区的宠物
