              - generic [ref=e64]: 宠物入境中国需要隔离多久？
            - article [ref=e65]:
              - generic [ref=e66]: 助手
              - generic [ref=e67]:
                - paragraph [ref=e68]:
                  - text: 宠物入境中国若需隔离检疫，隔离时间为
                  - strong [ref=e69]: 30天
                  - text: （截留期限计入在内）。
                - paragraph [ref=e70]:
                  - strong [ref=e71]: 政策依据：
                  - text: 《海关总署公告2019年第5号（关于进一步规范携带宠物入境检疫监管工作的公告）》第二条规定：“携带入境的宠物应在海关指定的隔离场隔离检疫30天（截留期限计入在内）。”以及《中华人民共和国携带入境宠物检疫要求》一、总体要求（五）规定：“需实施隔离检疫的宠物须从建设有隔离检疫设施的口岸入境，并在海关指定的隔离检疫场隔离检疫30天。”
                - paragraph [ref=e72]:
                  - emphasis [ref=e73]: 注：来自指定国家或地区且具有有效电子芯片经现场检疫合格、来自非指定国家或地区提供符合要求的狂犬病抗体检测报告并经现场检疫合格，或属于导盲犬、导听犬、搜救犬且提供相应证明经现场检疫合格的宠物，可免于隔离检疫。
            - article [ref=e74]:
              - generic [ref=e75]: 用户
              - generic [ref=e76]: 那需要准备哪些材料？
            - article [ref=e77]:
