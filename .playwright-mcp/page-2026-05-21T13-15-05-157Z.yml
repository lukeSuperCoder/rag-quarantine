            - generic [ref=e143]:
              - generic [ref=e144]: 中华人民共和国携带宠物入境检疫要求
              - generic [ref=e145]: 一、总体要求 · chunk 1
              - paragraph [ref=e146]: 一、总体要求 （一）携带入境的宠物（犬、猫）必须依据《中华人民共和国海关法》《中华人民共和国进出境动植物检疫法》及其实施条例的相关规定，接受海关检疫监管。 （二）中国海关对携带入境的宠物按照指定国家或地区、非指定国家或地区实施分类管理。 （三）1名携带人每次入境仅限携带1只宠物。 （四）携带入境的宠物应当在入境口岸海关接受现场检疫。海关依据现场检疫、隔离检疫结果，对宠物作放行、限期退回或销毁处理。 （五）需实施隔离检疫的宠物须从建设有隔离检疫设施的口岸入境，并在海关指定的隔离检疫场隔离检疫30天。 （六）作限期退回处理的宠物，携带人应当在规定期限内持海关签发的截留凭证，领取并携带宠物出境；逾期不领取的或无法限期退回的，视为自动放弃，作销毁处理。 （七）为全面、准确掌握旅客携带宠物进境的情况，携带人在现场应填写《携带入境宠物（犬、猫）信息登记表》。
