              - generic [ref=e132]: 中华人民共和国携带宠物入境检疫要求
              - generic [ref=e133]: 四、携带入境宠物的隔离检疫要求 · chunk 4
              - paragraph [ref=e134]: 四、携带入境宠物的隔离检疫要求 （一）隔离检疫期间，宠物原则不允许被带出隔离场所。 （二）隔离检疫期间，如宠物出现异常健康状况，海关应及时通知携带人。经携带人申请，海关可以允许宠物诊疗机构进入指定隔离场所的指定区域诊疗；相应诊疗项目无法在指定隔离场所内完成的，宠物在满足诊疗条件和海关监管要求的机构实施诊疗，海关对诊疗过程实施监督。
