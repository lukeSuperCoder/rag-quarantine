              - generic [ref=e136]: 未标注 · 未分章节 · chunk 0
              - paragraph [ref=e137]: 海关总署公告2019年第5号（关于进一步规范携带宠物入境检疫监管工作的公告） 为进一步适应口岸执法新形势，安全、科学、规范做好携带入境宠物（犬、猫）的检疫监管工作。现将有关事项公告如下： 一、携带入境的活动物仅限犬或者猫（以下称“宠物”），并且每人每次限带1只。携带宠物入境的，携带人应当向海关提供输出国家或者地区官方动物检疫机构出具的有效检疫证书和狂犬病疫苗接种证书。宠物应当具有电子芯片。 二、携带入境的宠物应在海关指定的隔离场隔离检疫30天（截留期限计入在内）。需隔离检疫的宠物应当从建设有隔离检疫设施的口岸入境。海关对隔离检疫的宠物实行监督检查。海关按照指定国家或地区和非指定国家或地区对携带入境的宠物实施分类管理，具有以下情形的宠物免于隔离检疫： （一）来自指定国家或者地区携带入境的宠物，具有有效电子芯片，经现场检疫合格的； （二）来自非指定国家或者地区的宠物，具有有效电子芯片，提供采信实验室出具的狂犬病抗体检测报告（抗体滴度或免疫抗体量须在0.5IU/ml以上）并经现场检疫合格的； （三）携带宠物属于导盲犬、导听犬、搜救犬的，具有有效电子芯片，携带人提供相应使用者证明和专业训练证明并经现场检疫合格的。 指定国家或地区名单、采信狂犬病抗体检测结果的实验室名单、建设有隔离检疫设施的口岸名单以海关总署公布为准。 三、携带宠物入境有下列情况之一的，海关按照有关规定予以限期退回或者销毁处理： （一）携带宠物超过限额的； （二）携带人不能向海关提供输出国家或者地区官方动物检疫机构出具的有效检疫证书或狂犬病疫苗接种证书的； （三）携带需隔离检疫的宠物，从不具有隔离检疫设施条件的口岸入境的； （四）宠物经隔离检疫不合格的。 对仅不能提供疫苗接种证书的导盲犬、导听犬、搜救犬，经携带人申请，可以在有资质的机构对其接种狂犬病疫苗。 作限期退回处理的宠物，携带人应当在规定的期限内持海关签发的截留凭证，领取并携带宠物出境；逾期不领取的，作自动放弃处理。 四、关于携带宠物入境的具体检疫要求详见附件《中华人民共和国携带入境宠物检疫要求》。 本公告内容自2019年5月1日起施行。 特此公告。
