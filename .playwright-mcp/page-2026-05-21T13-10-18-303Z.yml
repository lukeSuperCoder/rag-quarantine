              - paragraph [ref=e85]: 三、来自于非指定国家或地区的宠物 （一）非指定国家或地区是指除前文所列国家或地区以外的所有国家或地区。 （二）来自非指定国家和地区的宠物，应提供官方检疫证书、疫苗接种证书、中国海关采信检测结果的实验室出具的狂犬病抗体检测报告（抗体滴度或免疫抗体量须在0.5IU/ml以上），并植入有芯片，经现场检疫合格后，予以放行。 （三）无需隔离检疫的宠物可通过任何口岸入境。需要隔离检疫的宠物仅在具备隔离检疫条件的口岸允许携带入境。需要隔离检疫的宠物从不具备隔离检疫条件的非指定口岸携带入境的宠物，作退回或销毁处理。 （四）对于无法提供官方检疫证书或疫苗接种证书的宠物，作退回或销毁处理。 对于出现无法提供中国海关采信检测结果实验室出具的狂犬病抗体检测报告或未植入芯片情况中的一种或两种（包括无法提供或提供材料不合格）的宠物，作隔离检疫30天处理。 （五）宠物植入的芯片须符合国际标准ISO 11784和11785。15位微芯片代码只包含数字，并确保可被读写器读取。 如芯片不符合上述标准，应自备可以读取所植入芯片的读写器。 （六）宠物接受注射的疫苗应为灭活病毒疫苗或重组/改良疫苗，不应为活病毒疫苗。 （七）狂犬病抗体滴度检测的采血日期应不早于第2次狂犬病疫苗接种（可同一天或晚于）。 狂犬病抗体滴度检测的有效期为自采血日起一年内（注：宠物接受狂犬病疫苗接种后，在有效期内再次接种疫苗的，则狂犬病抗体滴度检测的结果持续有效）。 （八）宠物必须在“狂犬病疫苗接种的有效期间”和 “狂犬病抗体检测的有效期间”内抵境。 （九）宠物须在抵境之前14日内，接受输出国家或地区官方机构进行的动物卫生临床检查，确保没有感染《中华人民共和国进境动物检疫疫病名录》中所列包括狂犬病在内的相关动物传染病、寄生虫病。 （十）宠物随附的官方检疫证书必须包括以下内容： 1.宠物资料（包括出生日期或年龄）； 2.植入芯片的编号、日期和植入部位； 3.狂犬病疫苗接种时间和有效期，疫苗的种类（非活性疫苗或者重组型疫苗）、疫苗的品名、制造公司名； 4.狂犬病抗体滴度检测采血年月日、检测机构名、抗体滴度结果； 5.动物卫生临床检查结果与日期。 以上内容不能出现修改痕迹。 如果证书存在任何缺陷，宠物将做退回或销毁处理。 （十一）中国海关对携带入境、来自非指定国家或地区宠物的现场检疫内容主要包括核验官方检疫证书、疫苗接种证书、狂犬病抗体滴度检测结果、芯片和现场临床检查。 （十二）现场临床检查发现动物传染病、寄生虫病症状的宠物做隔离检疫处理。
            - button "中华人民共和国携带宠物入境检疫要求 未标注 · 四、携带入境宠物的隔离检疫要求 · chunk 4 四、携带入境宠物的隔离检疫要求 （一）隔离检疫期间，宠物原则不允许被带出隔离场所。 （二）隔离检疫期间，如宠物出现异常健康状况，海关应及时通知携带人。经携带人申请，海关可以允许宠物诊疗机构进入指定隔离场所的指定区域诊疗；相应诊疗项目无法在指定隔离场所内完成的，宠物在满足诊疗条件和海关监管要求的机构实施诊疗，海关对诊疗过程实施监督。" [ref=e86] [cursor=pointer]:
