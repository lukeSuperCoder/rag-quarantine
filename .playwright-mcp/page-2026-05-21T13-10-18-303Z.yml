              - paragraph [ref=e77]: 一、总体要求 （一）携带入境的宠物（犬、猫）必须依据《中华人民共和国海关法》《中华人民共和国进出境动植物检疫法》及其实施条例的相关规定，接受海关检疫监管。 （二）中国海关对携带入境的宠物按照指定国家或地区、非指定国家或地区实施分类管理。 （三）1名携带人每次入境仅限携带1只宠物。 （四）携带入境的宠物应当在入境口岸海关接受现场检疫。海关依据现场检疫、隔离检疫结果，对宠物作放行、限期退回或销毁处理。 （五）需实施隔离检疫的宠物须从建设有隔离检疫设施的口岸入境，并在海关指定的隔离检疫场隔离检疫30天。 （六）作限期退回处理的宠物，携带人应当在规定期限内持海关签发的截留凭证，领取并携带宠物出境；逾期不领取的或无法限期退回的，视为自动放弃，作销毁处理。 （七）为全面、准确掌握旅客携带宠物进境的情况，携带人在现场应填写《携带入境宠物（犬、猫）信息登记表》。
            - button "中华人民共和国携带宠物入境检疫要求 未标注 · 二、来自于指定国家或地区的宠物 · chunk 2 二、来自于指定国家或地区的宠物 （一）指定国家或地区包括新西兰、澳大利亚、斐济、法属波利尼西亚、美国夏威夷、美国关岛、牙买加、冰岛、英国、爱尔兰、列支敦士登、塞浦路斯、葡萄牙、瑞典、瑞士、日本、新加坡、中国香港、中国澳门。 （二）来自上述国家或地区携带入境的宠物，应提供有效的输出国家或地区官方出具的检疫证书和疫苗接种证书，并植入有效电子芯片，经现场检疫合格后，予以放行。 （三）无需隔离检疫的宠物可通过任何口岸入境。需要隔离检疫的宠物仅在具备隔离检疫条件的口岸允许携带入境。需要隔离检疫的宠物从不具备隔离检疫条件的非指定口岸携带入境的宠物，作限期退回或销毁处理。 （四）对于无法提供官方检疫证书或疫苗接种证书的宠物，作限期退回或销毁处理。 对于仅未植入芯片的宠物，作隔离检疫30天处理。 （五）宠物植入的芯片须符合国际标准ISO 11784和11785。15位微芯片代码只包含数字，并确保可被读写器读取。 如芯片不符合上述标准，应自备可以读取所植入芯片的读写器。 （六）宠物须在抵境之前14日内，接受输出国家或地区官方机构进行的动物卫生临床检查，确保没有感染《中华人民共和国进境动物检疫疫病名录》中所列包括狂犬病在内的相关动物传染病、寄生虫病。 （七）宠物随附的官方检疫证书须包括以下内容： 1.宠物资料（包括品种、学名、性别、毛色、出生日期或年龄）； 2.植入芯片的编号、日期和植入部位； 3.动物卫生临床检查结果与日期。 以上内容涂改将导致证书无效。 如果证书存在任何缺陷，宠物将做退回或销毁处理。 （八）中国海关对携带入境、来自指定国家或地区宠物的现场检疫内容主要包括核验官方检疫证书、芯片和现场临床检查。 （九）现场临床检查发现动物传染病、寄生虫病症状的宠物应进行隔离检疫。" [ref=e78] [cursor=pointer]:
