            - button "中华人民共和国携带宠物入境检疫要求 未标注 · 五、其他说明事项 · chunk 5 五、其他说明事项 （一）携带导盲犬、导听犬、搜救犬入境的，具备有效官方检疫证书、疫苗接种证书、电子芯片、相应专业训练证明的，经现场检疫合格，可以免予隔离检疫。 （二）年老体弱、处于妊娠或哺乳期以及有既往病症的宠物可能不适于运输或隔离检疫，携带者应在咨询本地兽医确保其承受能力后，携带入境并承担相应责任。" [ref=e90] [cursor=pointer]:
