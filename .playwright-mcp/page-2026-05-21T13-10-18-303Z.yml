              - paragraph [ref=e97]: 第四章 处置 第十九条 海关按照《中华人民共和国关税法》、《进境物品关税、增值税、消费税征收办法》以及其他有关法律、行政法规的规定，对准许进境的行李物品征收税款。 第二十条 进出境行李物品在依法缴清税款或者提供担保、提交许可证件以及其他证明材料后，海关予以放行；但依法需检疫的，还应当经检疫合格。 第二十一条 进境人员携带的行李物品符合《中华人民共和国进出境动植物检疫法实施条例》第四十三条规定情形的，海关予以截留并出具相关凭证。截留期限不超过七日，但需要作实验室检疫、隔离检疫的，按照有关法律、行政法规和海关总署规定办理。 第二十二条 进境人员携带的行李物品有下列情形之一的，应当实施检疫处理，并接受海关监督： （一）受到检疫传染病污染的； （二）发现与人类健康有关的病媒生物的； （三）存在传播检疫传染病风险的其他情形的； （四）发现具有动植物检疫风险的活体有害生物，且可能造成扩散的； （五）其他依法应当实施检疫处理的。 第二十三条 有下列情形之一，无法当场办结海关手续的，进出境人员应当在三个月内予以办结： （一）应当缴纳进境行李物品税款的； （二）应当提交许可证件以及其他证明材料的； （三）应当按照货物办理海关手续的； （四）对进出境物品的属性、内容、价值等存疑，需要进行检测、鉴定等处理的； （五）需要作退回等处理，无法立即实施的。 前款第四项的作业时间不计入时限。 第二十四条 符合本办法第二十三条规定的下列行李物品，进出境人员应当在七日内办结海关手续： （一）危险化学品； （二）鲜活、易腐、易失效等不宜长期保存的行李物品； （三）血液等人体组织、病原微生物、生物制品等关系公共卫生安全的行李物品； （四）其他海关总署规定的行李物品。 第二十五条 进境人员携带的行李物品有下列情形之一的，且已经海关依法处理的，经海关同意可以退回： （一）未缴纳进境行李物品税款的； （二）未能按照货物办理海关手续的； （三）未能提交许可证件以及其他证明材料的； （四）属于禁止进境物品的； （五）经检疫不合格又无有效处理方法的； （六）其他依法可以退回的。 第二十六条 进出境人员对行李物品声明放弃的，经海关同意可以作放弃处置，但依法不得放弃的除外。 经海关截留检疫合格后，进境人员未在截留期限内领取进境行李物品的，作自动放弃处理。 第二十七条 进境人员携带的行李物品有下列情形之一的，由海关依法进行拍卖、变卖、销毁等处置： （一）经海关同意放弃或者自动放弃的； （二）属于禁止进境物品且无法退回的； （三）经检疫不合格又无有效处理方法且无法退回的； （四）未在规定时限内办结海关手续的； （五）在海关监管区内超过三个月无人认领的。 上述行李物品不宜长期保存的，海关可以根据实际情况提前处理。
